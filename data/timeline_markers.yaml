  - label: Capitanian extinction
    explanation: |
      The Capitanian extinction, occurring approximately 262 million years ago during
      the Middle Permian, represents a distinct but relatively minor extinction pulse
      within the broader Late Permian biotic crises. It is characterized by selective
      losses in marine faunas, notably affecting fusulinid foraminifers, corals, and
      certain brachiopod groups. This event preceded the more severe end-Permian mass
      extinction and marks a significant faunal turnover within Permian ecosystems.
      Environmental perturbations associated with the Capitanian extinction include
      pronounced global warming, oceanic anoxia, and volcanic activity linked to the
      Emeishan Large Igneous Province. These factors likely triggered habitat
      degradation and ecological stress, driving differential extinction patterns.
      Although less catastrophic than the terminal Permian extinction, the Capitanian
      event underscores the vulnerability of marine biota to rapid climatic and
      geochemical changes during the Permian period.
