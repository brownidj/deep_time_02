  - label: Toarcian OAE
    explanation: |
      The Toarcian Oceanic Anoxic Event (OAE), occurring around 183 million years ago
      during the Early Jurassic, represents a significant, albeit minor, biotic and
      geochemical perturbation within the geologic timeline. This event is
      characterized by widespread deposition of organic-rich black shales and
      pronounced negative carbon isotope excursions, indicative of global-scale
      alteration in oceanic redox conditions. Enhanced volcanic activity and
      associated greenhouse gas emissions likely triggered widespread marine anoxia,
      disrupting oceanic nutrient cycles and resulting in a transient but notable
      extinction pulse affecting marine fauna, particularly ammonites and marine
      invertebrates.  
      
      Although less severe than the larger Jurassic or Cretaceous
      OAEs, the Toarcian OAE provides critical insight into the coupling between
      volcanic forcing, ocean chemistry, and biological crises. Its study elucidates
      the dynamics of Earth’s deep-time climate system and biotic resilience under
      rapid environmental stress, contributing to broader understanding of carbonate
      platform drowning and early Mesozoic paleoceanographic evolution.
    short_label: TOAE
