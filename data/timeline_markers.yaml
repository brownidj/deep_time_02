  - label: Hangenberg event
    explanation: |
      The Hangenberg event, occurring around 359 million years ago at the Devonian-
      Carboniferous boundary, represents a significant though relatively minor
      extinction pulse within the Late Devonian extinction complex. It is
      characterized by notable biotic turnover primarily affecting marine vertebrates,
      particularly jawed and jawless fishes, as well as reef-building organisms and
      conodonts. Geologically, the event is marked by distinctive black shale deposits
      indicative of widespread anoxia and environmental stress in the global oceans,
      reflecting a collapse of marine ecosystems.  This event is critical for
      understanding the transition between the Devonian and Carboniferous periods,
      highlighting a phase of ecological crisis and faunal restructuring. It
      contributed to the shaping of early Carboniferous biodiversity and played a role
      in long-term paleoceanographic and climatic changes, emphasizing its importance
      as a geologic timeline marker despite its relative subtlety compared to larger
      mass extinctions.
