  - label: Late Pleistocene megafaunal extinctions
    explanation: |
      The Late Pleistocene megafaunal extinctions, occurring around 0.05 Ma (50,000
      years ago), represent a notable but relatively minor extinction pulse within the
      late Quaternary period. This event primarily involved the decline and
      disappearance of large-bodied terrestrial vertebrates, particularly megafauna
      such as mammoths, saber-toothed cats, and giant ground sloths. Although less
      extensive than the terminal Pleistocene extinctions closer to 0.01 Ma, this
      pulse marks a significant ecological turnover influenced by climatic
      fluctuations and the initial impacts of human predation and landscape
      alteration.  These extinctions reflect complex interactions between
      environmental changes, including glacial-interglacial cycles, and anthropogenic
      pressures. The disappearance of these megafaunal taxa reshaped ecosystems by
      altering trophic dynamics and nutrient cycling. Consequently, the Late
      Pleistocene megafaunal extinction pulse is a key stratigraphic marker for
      understanding Quaternary biodiversity shifts and early human-environment
      interactions.
