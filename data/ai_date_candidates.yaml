bohaiornithidae:
  context:
    common_label: Bohaiornithidae
    current_dates:
      date_basis: unresolved
      date_confidence: low
      date_notes: No usable specialist, PBDB, TimeTree, or reputable educational date found
        for bohaiornithidae.
      date_resolution_method: unresolved
      divergence_ma: null
      end_ma: null
      start_ma: null
    label: Bohaiornithidae
    parent_id: dinosauria
    rank: family
  proposed_date_resolution:
    date_basis: fossil_first_appearance
    date_confidence: low
    date_notes: 'Bohaiornithidae is known from the Early Cretaceous Jehol Group with securely
      referred occurrences in both the Yixian and Jiufotang formations. The family was erected
      and diagnosed by Wang et al. (2014), who listed included genera from Jehol Group localities;
      subsequent descriptive work continues to place bohaiornithids in these formations. ([ivpp.ac.cn](https://www.ivpp.ac.cn/sourcedb/zw/rck/jcqn/202209/W020140121388700972757.pdf))

      The holotype of Bohaiornis guoi was originally reported from Lamadong, Jianchang as
      Yixian Formation by Hu et al. (2011), but Wang et al. (2014) argued the Lamadong outcrops
      at that locality represent the Jiufotang Formation. Regardless, multiple bohaiornithids
      are securely documented from the Yixian Formation (e.g., Sulcavis geeorum), establishing
      Yixian as providing the earliest defensible fossil occurrence for the clade. ([ivpp.cas.cn](https://ivpp.cas.cn/sourcedb/zw/rck/jcqn/202311/P020140313550491380549.pdf))

      High-precision CA-ID-IRMS U-Pb zircon geochronology tightly brackets the Yixian Formation
      in the Jin–Yang basin between 125.755 ± 0.061 Ma and 124.122 ± 0.048 Ma; we conservatively
      use the older bound (125.755 Ma) as a formation-derived minimum for Bohaiornithidae,
      acknowledging individual bohaiornithid horizons within Yixian may be younger. This is
      a fossil occurrence/formation minimum, not a true divergence time. ([academic.oup.com](https://academic.oup.com/nsr/article/8/6/nwab063/6223474?utm_source=openai))

      Bohaiornithids also occur in the overlying Jiufotang Formation (e.g., Neobohaiornis
      lamadongensis), whose chronology has recently been refined to 124.44–112.25 Ma in western
      Liaoning; however, the youngest securely dated bohaiornithid-bearing bed within Jiufotang
      has not been directly tied to a specific absolute age in that succession, so end_ma
      is left null. ([nature.com](https://www.nature.com/articles/s41598-024-82869-8?utm_source=openai))

      Some analyses include the older Shenqiornis from the Huajiying (Qiaotou) beds within
      Bohaiornithidae, but both its placement and the precise ages of those beds are debated;
      SIMS U-Pb dating suggests earliest Jehol elements around ~129–131 Ma in the Huajiying
      Formation, yet bohaiornithid monophyly and membership remain unstable across datasets.
      We therefore do not use Huajiying occurrences to push the family minimum older. ([pubmed.ncbi.nlm.nih.gov](https://pubmed.ncbi.nlm.nih.gov/32513701/?utm_source=openai))

      '
    date_resolution_method: formation_age_inference
    date_sources:
    - source_label: Wang et al. 2014 — Bohaiornithidae fam. nov. (Vertebrata PalAsiatica 52:31–76)
      source_type: specialist_taxonomic_reference
      url: https://www.ivpp.ac.cn/sourcedb/zw/rck/jcqn/202209/W020140121388700972757.pdf
      note: Establishes Bohaiornithidae; summarizes included taxa and notes Bohaiornis holotype
        likely from Jiufotang rather than Yixian.
    - source_label: Hu et al. 2011 — Bohaiornis guoi holotype (Journal of Vertebrate Paleontology
        31:154–161)
      source_type: specialist_descriptive_reference
      url: https://ivpp.cas.cn/sourcedb/zw/rck/jcqn/202311/P020140313550491380549.pdf
      note: Original description; reports Lamadong (Jianchang) specimen from the Lower Cretaceous
        Yixian Formation.
    - source_label: O’Connor et al. 2013 — Sulcavis geeorum from the Yixian Formation (JVP
        33:1–12)
      source_type: specialist_descriptive_reference
      url: https://www.tandfonline.com/doi/full/10.1080/02724634.2012.719176
      note: Documents a bohaiornithid-grade enantiornithine from the Yixian Formation, corroborating
        early Yixian occurrence.
    - source_label: Zhong et al. 2021 — High-precision geochronology of the Yixian Formation
        (National Science Review 8:nwab063)
      source_type: geochronology_reference
      url: https://academic.oup.com/nsr/article/8/6/nwab063/6223474
      note: CA‑ID‑IRMS zircon ages bracket Yixian at 125.755 ± 0.061 Ma to 124.122 ± 0.048
        Ma; used to set the minimum.
    - source_label: Zhong et al. 2025 — High-precision chronology of the Jiufotang Formation
        (Earth and Planetary Science Letters 671:119688)
