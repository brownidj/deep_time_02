    - source_label: Mehmood et al. 2023 – Sedimentary facies and depositional environments
        of the Maastrichtian Pab Formation, Rakhi Gorge (JMSE 11:726)
      source_type: literature
      url: https://www.mdpi.com/2077-1312/11/4/726
      note: Treats the Pab Formation as Maastrichtian and notes the latest Cretaceous Vitakri
