    label: Sauropodidae
    parent_id: dinosauria
    rank: family
  proposed_date_resolution:
    date_basis: formation_age_inference
    date_confidence: low
    date_notes: '“Sauropodidae” is treated here as a broad sauropod-family placeholder; a
      cautious minimum is tied to the oldest widely accepted sauropod body fossil. The earliest
      definitive sauropod remains are from Vulcanodon karibaensis at the Island 126/127 locality
      (Lake Kariba, Zimbabwe). A stratigraphic reassessment places the type horizon in the
      uppermost Forest Sandstone and correlates it with the Clarens Formation of the main
      Karoo Basin, implying a Sinemurian–Pliensbachian age and c. 10–15 Myr older than earlier
      Toarcian assignments. Detrital-zircon work indicates the Clarens Formation is mainly
      Pliensbachian; using the ICS numerical boundary for the base of the Pliensbachian (190.8
      Ma) provides a conservative formation-derived minimum for the first appearance of this
      clade. Reports of a Late Triassic sauropod (Isanosaurus attavipachi) from the Nam Phong
      Formation suggest a potentially older record, but both the age of the relevant Nam Phong
      strata and the taxon’s placement have been considered uncertain; therefore, they are
      not used to fix the minimum here. This is a fossil-occurrence/formation-based minimum
      only and should not be interpreted as a true molecular or crown origin for Sauropodidae/Sauropoda.

      '
    date_resolution_method: formation_age_inference
    date_sources:
    - source_label: Viglietti et al. 2018, J. African Earth Sciences 137:149–156
      source_type: specialist_descriptive_reference
      url: https://www.sciencedirect.com/science/article/abs/pii/S1464343X17303953
      note: Repositions Vulcanodon to the upper Forest Sandstone; correlates with Clarens
        Formation; infers Sinemurian–Pliensbachian and ~10–15 Ma older than previously thought.
    - source_label: Bordy et al. 2020, Earth-Science Reviews 203:103120
      source_type: geochronology_reference
      url: https://par.nsf.gov/servlets/purl/10144138
      note: Chronostratigraphic framework for the upper Stormberg Group; Clarens Formation
        mainly Pliensbachian based on U–Pb detrital zircon MDAs.
    - source_label: International Commission on Stratigraphy, International Chronostratigraphic
        Chart (2023/09)
      source_type: geochronology_reference
      url: http://www.stratigraphy.org/ICSchart/ChronostratChart2023-09.pdf
      note: Numerical stage boundaries; Pliensbachian base at 190.8 Ma used to anchor a conservative
        minimum.
    - source_label: Buffetaut et al. 2000, Nature 407:72–74
      source_type: specialist_descriptive_reference
      url: https://www.nature.com/articles/35024060
      note: Original report of a purported Late Triassic sauropod (Isanosaurus); establishes
        possibility of a pre-Jurassic sauropod record, though later works question exact age/placement.
    - source_label: Racey & Goodall 2009, in GSL Spec. Publ. 315
      source_type: geochronology_reference
      url: https://www.researchgate.net/publication/266150360
      note: Palynology/stratigraphy of Khorat Group red beds; indicates parts of Nam Phong
        may extend into the Jurassic, underscoring age uncertainty for Isanosaurus-bearing
        horizons.
    - source_label: 'GBIF: Sauropodidae'
      source_type: taxonomic_database
      url: https://www.gbif.org/species/4966982
      note: Backbone family entry used to document taxon name usage at family rank.
    divergence_ma: null
    end_ma: 66.0
    start_ma: 190.8
  review:
    decision_note: 'Accept a conservative start_ma of 190.8 Ma as a low-confidence, formation-correlated
      minimum based on the Vulcanodon horizon’s linkage to the mainly Pliensbachian Clarens-equivalent
      upper Forest Sandstone. The Isanosaurus/Nam Phong record is acknowledged but not used
      to set the minimum due to unresolved age and taxonomic issues.

      '
    reviewed_at: null
    reviewer: null
    status: pending
