    date_notes: 'Ignotornidae is an avian ichnofamily erected for tetradactyl bird tracks
      with a prominent hallux and characteristic semi‑palmate web traces. The earliest well-documented
      occurrences assigned to Ignotornidae come from Lower Cretaceous units: the Haman Formation
      of South Korea (Ignotornis yangi, I. gajinensis) and the Dakota Group of Colorado (Ignotornis
      mcconnelli), with the first Canadian record from the Albian Gates Formation. Specialist
      sources place the Dakota Ignotornis horizon in the upper Albian–lower Cenomanian, and
      summarize the Korean Haman material as Aptian–middle Albian; more recent detrital-zircon
      work constrains the Haman Formation to Albian ages (~105–96 Ma) at studied sites. Given
      these formation-level constraints, an Albian placement is appropriate; a cautious minimum
      start is set at the Aptian–Albian boundary (113.1 Ma) based on U–Pb calibration of that
      boundary. This is a fossil-occurrence/formation-derived minimum presence for the ichnofamily,
      not a phylogenetic origin estimate.

      '
