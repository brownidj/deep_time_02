      source_type: specialist_descriptive_reference
      url: https://repository.si.edu/bitstreams/286c8a1d-1432-4b71-97f8-0f6a971324dd/download
      note: Re-examines type; confirms Lower Miocene Thomas Farm provenance and reassigns
