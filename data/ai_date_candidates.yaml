alethoalaornithidae:
  context:
    common_label: Alethoalaornithidae
    current_dates:
      date_basis: unresolved
      date_confidence: low
      date_notes: No usable specialist, PBDB, TimeTree, or reputable educational date found
        for alethoalaornithidae.
      date_resolution_method: unresolved
      divergence_ma: null
      end_ma: null
      start_ma: null
    label: Alethoalaornithidae
    parent_id: dinosauria
    rank: family
  proposed_date_resolution:
    date_basis: unresolved
    date_confidence: low
    date_notes: 'Alethoalaornithidae was erected for the monogeneric enantiornithine Alethoalaornis
      agitornis from western Liaoning, China; the holotype is LPM 00009 and the taxon has
      been used in subsequent specialist work. Available sources consistently place the occurrence
      in the Jiufotang Formation (Jehol Group, Aptian), but an accessible, specimen-level
      bed or dated horizon tied explicitly to LPM 00009 could not be verified here. Absolute
      ages for Jiufotang include a 40Ar/39Ar age of 120.3 ± 0.7 Ma from a tuff interbedded
      with fossil-bearing shales at the Shangheshou section, SIMS U–Pb zircon ages of 122.0
      ± 0.9 Ma and 118.9 ± 0.8 Ma from Jianchang Basin sections, and an LA–ICP–MS U–Pb age
      of 118.07 ± 0.98 Ma from an upper Jiufotang rhyolitic tuff. Recent high‑precision U–Pb
      geochronology and Bayesian age modeling further refine fossiliferous Jiufotang layers
      near ~121 Ma. In the absence of a published, specimen‑tied horizon for Alethoalaornis,
      these values constrain only a formation‑level occurrence window in the Aptian and do
      not justify selecting a single numeric date for the clade’s origin. Treat any Jiufotang‑derived
      value strictly as a fossil/formation‑based minimum, not an evolutionary divergence estimate.

      '
    date_resolution_method: unresolved
    date_sources:
    - source_label: 'Li L., Hu D.-Y., Duan Y., Gong E.-P., Hou L.-H. 2007. Alethoalaornithidae
        fam. nov.: a new family of enantiornithine bird from the Lower Cretaceous of western
        Liaoning, Acta Palaeontologica Sinica 46(3):365–372 (Chinese).'
      source_type: specialist_taxonomic_reference
      url: https://jglobal.jst.go.jp/en/detail?JGLOBAL_ID=200902295330897483
      note: Original family erection; establishes Alethoalaornithidae from western Liaoning
        (Jehol Group).
    - source_label: BioNames record for Li et al. 2007 (Acta Palaeontologica Sinica 46(3):365–372)
      source_type: taxonomic_database
      url: https://bionames.org/references/98036aadaaaf4a71c68d4968ed3798ec
      note: Bibliographic confirmation of the 2007 family description.
    - source_label: 'GBIF: Alethoalaornis Li, Hu, Duan, Gong & Hou, 2007'
      source_type: taxonomic_database
      url: https://www.gbif.org/species/4966921
      note: Backbone taxonomy entry placing Alethoalaornis in Alethoalaornithidae; echoes
        original citation.
    - source_label: 'O’Connor, J.K. & Dyke, G.J. 2011. A revision of enantiornithine (Aves:
        Ornithothoraces) skull morphology.'
      source_type: specialist_descriptive_reference
      url: https://www.tandfonline.com/doi/abs/10.1080/14772019.2010.526639
      note: Includes Alethoalaornis agitornis (specimen LPM 00009) in comparative figures;
        supports usage but not horizon.
    - source_label: He et al. 2004. Timing of the Jiufotang Formation (Jehol Group) in Liaoning,
        NE China, and its implications. Geophys. Res. Lett. 31:L12605.
      source_type: geochronology_reference
      url: https://agupubs.onlinelibrary.wiley.com/doi/full/10.1029/2004GL019790
      note: 40Ar/39Ar tuff interbedded with fossil-bearing shales dated 120.3 ± 0.7 Ma at
        Shangheshou; widely cited Jiufotang anchor.
    - source_label: Zhong et al. 2021. New geochronological constraints for the Jiufotang
        Formation, Jianchang Basin. Palaeogeogr. Palaeoclimatol. Palaeoecol.
      source_type: geochronology_reference
      url: https://www.sciencedirect.com/science/article/pii/S0031018221004429
      note: SIMS U–Pb zircon ages of 122.0 ± 0.9 Ma and 118.9 ± 0.8 Ma from different Jiufotang
        sections.
    - source_label: Gao et al. 2024. New palynological data and U–Pb dating from the Jiufotang
        Formation.
      source_type: geochronology_reference
      url: https://biosoil.ru/storage/entities/publication/22442/f834d139-dc9d-425b-81a0-5d912675791a.pdf
      note: LA–ICP–MS U–Pb age of 118.07 ± 0.98 Ma from an upper Jiufotang rhyolitic tuff;
        supports Aptian range.
    - source_label: 'High-precision geochronology of the Early Cretaceous Jiufotang Formation:
        Temporal constraints on the late phase of the Jehol Biota (EPSL, 2025).'
      source_type: geochronology_reference
      url: https://www.sciencedirect.com/science/article/pii/S0012821X25004868
      note: Reports precisely dated fossiliferous layers near ~121 Ma using U–Pb and Bayesian
        modeling; supports refined Aptian timing.
    divergence_ma: null
    end_ma: null
    start_ma: null
  review:
    decision_note: 'Kept all numeric fields null. Although Alethoalaornithidae (for Alethoalaornis
      agitornis) is supported by the 2007 Acta Palaeontologica Sinica description and later
      specialist usage (LPM 00009), I did not find an accessible, bed‑level stratigraphic
      tie for the holotype beyond “Jiufotang Formation.” Multiple geochronology papers bracket
      Jiufotang within the Aptian (~122–118 Ma; some fossiliferous horizons ~121 Ma), but
      without a documented horizon for the Alethoalaornis specimen, selecting a single value
      would overstate precision. Next steps: obtain Li et al. (2007) and any museum/field
      documentation for LPM 00009 to verify exact locality and horizon; if a dated tuff or
      bed association is documented, propose a calibrated minimum age accordingly.

      '
    reviewed_at: null
    reviewer: null
    status: pending
archaeoceratopsidae:
  context:
    common_label: Archaeoceratopsidae
    current_dates:
      date_basis: unresolved
      date_confidence: low
      date_notes: No usable specialist, PBDB, TimeTree, or reputable educational date found
        for archaeoceratopsidae.
      date_resolution_method: unresolved
      divergence_ma: null
      end_ma: null
      start_ma: null
    label: Archaeoceratopsidae
    parent_id: dinosauria
    rank: family
  proposed_date_resolution:
    date_basis: fossil_first_appearance
    date_confidence: low
    date_notes: 'Archaeoceratopsidae is rarely used in recent taxonomy, so a cautious fossil-derived
      minimum is anchored to the type genus Archaeoceratops. The redescription of Archaeoceratops
      oshimai explicitly assigns the Mazongshan material to the late Early Cretaceous and
      “probably Albian” in age. Regional stratigraphic work on the Xinminpu (Xinminpu/Xinminbao)
      Group correlates gray-variegated beds (upper Xiagou Formation) to the Aptian and overlying
      red beds (beginning of the Zhonggou Formation) to the early Albian. Radiometric constraints
      from adjacent Hanxia and Hongliuxia sections place basalts near the Xiagou–Zhonggou
      transition at ~115–114 Ma, and a basalt low in the Zhonggou has been dated at ~112.4
      Ma, but specific Archaeoceratops-bearing horizons are not tied to a single dated bed.
      Treating this as a fossil-occurrence minimum rather than an evolutionary origin, the
      minimum is set at the Albian–Cenomanian boundary (100.5 Ma) on the current ICS timescale.
      If future specialist work firmly demonstrates an archaeoceratopsid occurrence in securely
      dated Aptian strata (e.g., Xiagou beds) or clarifies family circumscription, the minimum
      could shift older (~113–120 Ma); this is not adopted here due to horizon-level and taxonomic
      uncertainties.

      '
    date_resolution_method: formation_age_inference
    date_sources:
    - source_label: You & Dodson 2003 – Redescription of Archaeoceratops oshimai
      source_type: specialist_descriptive_reference
      url: https://app.pan.pl/archive/published/app48/app48-261.pdf
      note: States the Mazongshan Archaeoceratops material is late Early Cretaceous, probably
        Albian.
    - source_label: You, Dodson & Morschhauser (eds.) 2019 – Introducing the Mazongshan Dinosaur
        Fauna (SVP Memoir 18)
      source_type: specialist_taxonomic_reference
      url: https://ivpp.cas.cn/sourcedb/zw/klt/kycg/gswxyj/202312/P020231012344664297496.pdf
      note: Correlates gray-variegated beds to upper Xiagou (Aptian) and red beds to early
        Albian Zhonggou; locates Archaeoceratops/Auroraceratops occurrences within this scheme.
    - source_label: Suarez et al. 2019 – Chemostratigraphy of Xiagou and Zhonggou formations
        (SVP Memoir 18)
      source_type: geochronology_reference
      url: https://ivpp.cas.cn/sourcedb/zw/klt/kycg/gswxyj/202312/P020231012312802137366.pdf
      note: 'Reports U–Pb ages: 123 ± 2.6 Ma (Xiagou), 115 ± 4.5 Ma and 113.7 ± 1.8/115.6
        ± 1.1 Ma near the Xiagou–Zhonggou contact; supports Aptian–early Albian assignment.'
    - source_label: Harper et al. 2021 (preprint updated) – Aptian–Albian isotopes and Xiagou/Zhonggou
        framework
      source_type: geochronology_reference
      url: https://cp.copernicus.org/preprints/cp-2020-152/cp-2020-152.pdf
      note: Synthesizes Aptian–Albian correlation in the Jiuquan region; includes a new U–Pb
        age of 112.4 ± 0.3 Ma for a basalt at the lowermost Zhonggou.
    - source_label: Pancost et al. 2024 – Methane-fueled lake pelagic food webs (PNAS)
      source_type: geochronology_reference
      url: https://pmc.ncbi.nlm.nih.gov/articles/PMC11536134/
      note: Places the lacustrine Xiagou Formation in the Aptian within a regional biostratigraphic
        and geochronological framework.
    - source_label: International Chronostratigraphic Chart (Dec 2024)
      source_type: geochronology_reference
      url: https://stratigraphy.org/ICSchart/ChronostratChart2024-12.pdf
      note: Numerical stage boundaries used for the conservative minimum (Albian–Cenomanian
        = 100.5 Ma; Aptian–Albian ~113.2 Ma).
    - source_label: 'GBIF: Archaeoceratopsidae'
      source_type: taxonomic_database
      url: https://www.gbif.org/species/6141932
      note: Backbone taxon entry confirming family-level usage and spelling.
    divergence_ma: null
    end_ma: 66.0
    start_ma: 100.5
  review:
    decision_note: 'Adopted a conservative fossil minimum tied to the type genus Archaeoceratops
      and regional Xiagou–Zhonggou chronology. Used specialist descriptions to justify an
      Albian assignment and relied on basin-level chemostratigraphy and U–Pb constraints to
      frame the Aptian–early Albian window, but set the minimum at 100.5 Ma (Albian–Cenomanian
      boundary; ICS 2024) due to uncertain specimen placement relative to dated beds and unsettled
      family circumscription. Did not push older based on potential Aptian occurrences pending
      firmer horizon-level and phylogenetic documentation.

      '
    reviewed_at: null
    reviewer: null
    status: pending
arriagadoolithidae:
  context:
    common_label: Arriagadoolithidae
    current_dates:
      date_basis: unresolved
      date_confidence: low
      date_notes: No usable specialist, PBDB, TimeTree, or reputable educational date found
        for arriagadoolithidae.
      date_resolution_method: unresolved
      divergence_ma: null
      end_ma: null
      start_ma: null
    label: Arriagadoolithidae
    parent_id: dinosauria
    rank: family
  proposed_date_resolution:
    date_basis: fossil_first_appearance
    date_confidence: moderate
    date_notes: 'Arriagadoolithidae was erected to contain Arriagadoolithus (eggs associated
      with the alvarezsaurid Bonapartenykus) and the oogenus Triprismatoolithus. The Arriagadoolithus
      type material comes from upper levels of the Allen Formation at Salitral Ojo de Agua
      (Río Negro, Patagonia), generally regarded as middle Campanian–lower Maastrichtian;
      this provides only a broad formation-derived minimum and is not necessarily the first
      occurrence of the family. The oldest securely dated occurrence attributable to Arriagadoolithidae
      is Triprismatoolithus stephensi from the lowermost Two Medicine Formation (Sevenmile
      Hill, Montana), at a site immediately above a volcanic tuff/bentonite dated to 80.0
      Ma. Recent CA–ID–TIMS U–Pb geochronology constrains overall Two Medicine deposition
      to ca. 82.4–74.4 Ma, consistent with an early Campanian (~80 Ma) placement for this
      occurrence. Accordingly, start_ma is set to 80.0 as a conservative fossil first-appearance
      minimum for the oofamily, rather than a true evolutionary origin estimate. Younger Patagonian
      occurrences in the Allen Formation indicate persistence into the Campanian–Maastrichtian,
      but no single horizon yields a precise youngest bound; end_ma is left null.

      '
    date_resolution_method: formation_age_inference
    date_sources:
    - source_label: Agnolin, Powell, Novas & Kundrát 2012 – New alvarezsaurid with associated
        eggs; Arriagadoolithidae erected; includes Triprismatoolithus; Allen Fm. (Campanian–Maastrichtian)
      source_type: specialist_descriptive_reference
      url: https://ri.conicet.gov.ar/bitstream/handle/11336/272003/CONICET_Digital_Nro.fc86bfe8-a83e-4337-8749-6186f6b5294d_E.pdf
      note: Defines Arriagadoolithidae; explicitly lists included ootaxa (Arriagadoolithus,
        Triprismatoolithus) and gives locality/horizon in the Allen Formation (Campanian–Maastrichtian).
        ([ri.conicet.gov.ar](https://ri.conicet.gov.ar/bitstream/handle/11336/272003/CONICET_Digital_Nro.fc86bfe8-a83e-4337-8749-6186f6b5294d_E.pdf?isAllowed=y&sequence=5))
    - source_label: Jackson & Varricchio 2010 – Sevenmile Hill eggs; Triprismatoolithus stephensi
        above 80.0 Ma tuff (lowermost Two Medicine Fm.)
      source_type: specialist_descriptive_reference
      url: https://www.tandfonline.com/doi/abs/10.1080/02724634.2010.483537
      note: Reports site immediately above a volcanic tuff/bentonite dated to 80.0 Ma; describes
        Triprismatoolithus from the locality. ([tandfonline.com](https://www.tandfonline.com/doi/abs/10.1080/02724634.2010.483537?utm_source=openai))
    - source_label: 'Rogers et al. 2024 – GSA Bulletin: new CA–ID–TIMS U–Pb ages for the Two
        Medicine Formation (82.4–74.4 Ma)'
      source_type: geochronology_reference
      url: https://scholarworks.montana.edu/server/api/core/bitstreams/ef12f9ea-cbcf-443d-917b-9d391374ac75/content
      note: Provides calibrated age model and explicit deposition span 82.4–74.4 Ma, supporting
        an early Campanian position for the Sevenmile Hill horizon. ([scholarworks.montana.edu](https://scholarworks.montana.edu/server/api/core/bitstreams/ef12f9ea-cbcf-443d-917b-9d391374ac75/content))
    - source_label: 'Meso et al. 2025 – PLOS ONE: Bonapartenykus/Arriagadoolithus from Allen
        Fm. described as middle Campanian–lower Maastrichtian; quarry and “egg level 2” context'
      source_type: specialist_descriptive_reference
      url: https://journals.plos.org/plosone/article?id=10.1371/journal.pone.0308366
      note: Confirms Allen Formation age range at Salitral Ojo de Agua and documents the stratigraphic
        context of the alvarezsaur/egg material. ([journals.plos.org](https://journals.plos.org/plosone/article?id=10.1371%2Fjournal.pone.0308366&utm_source=openai))
    divergence_ma: null
    end_ma: 66.0
    start_ma: 80.0
  review:
    decision_note: 'Set start_ma to 80.0 Ma as a conservative fossil first-appearance minimum
      based on Triprismatoolithus in the lowermost Two Medicine Formation immediately above
      an 80.0 Ma tuff, corroborated by CA–ID–TIMS ages for the formation (82.4–74.4 Ma). Allen
      Formation occurrences (middle Campanian–lower Maastrichtian) support later persistence
      but do not yield a precise youngest bound; end_ma is left null. Sources include the
      oofamily’s original description, site-level descriptive work, and formation geochronology.

      '
    reviewed_at: null
    reviewer: null
