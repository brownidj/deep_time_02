    label: Saltasauridae
    parent_id: dinosauria
    rank: family
  proposed_date_resolution:
    date_basis: fossil_first_appearance
    date_confidence: low
    date_notes: 'The earliest well-documented saltasaurid body fossils are from Neuquensaurus
      (Saltasaurinae) in the Anacleto Formation of the Neuquén Basin (Cinco Saltos area, Río
      Negro Province, Argentina). Multiple specialist works place these Neuquensaurus occurrences
      within the Anacleto, which regional magnetostratigraphy at Auca Mahuevo constrains to
      early–middle Campanian. Published constraints for the Anacleto include a magnetostratigraphic/biostratigraphic
      age window of approximately 83.5–79.5 Ma and an independent detrital-zircon maximum
      depositional age near Paso Córdoba of 78.6 ± 1.7 Ma; together these indicate a Campanian
      age but do not yield a precise bed-by-bed date for the Neuquensaurus horizons at Cinco
      Saltos. Accordingly, the proposed start_ma is treated as a cautious formation-derived
      minimum for the family’s fossil first appearance, not a calibrated divergence date.
      Saltasaurid occurrences continue through the Campanian–Maastrichtian in South America
      and elsewhere (e.g., Saltasaurus in the Lecho Formation), but a secure last-appearance
      endpoint is not established here.

      '
    date_resolution_method: formation_age_inference
    date_sources:
    - source_label: Dingus et al. 2000, AMNH Novitates no. 3290
      source_type: geochronology_reference
      url: https://www.biodiversitylibrary.org/item/315451
      note: Magnetostratigraphic/stratigraphic constraints at Auca Mahuevo place the Anacleto
        Fm in the early–middle Campanian (~83.5–79.5 Ma).
    - source_label: Iglesias et al. (CONICET) c.2020–2021, First U–Pb detrital zircon ages
        (Paso Córdoba, Río Negro)
      source_type: geochronology_reference
      url: https://ri.conicet.gov.ar/handle/11336/202175
      note: Reports an Anacleto Fm maximum depositional age of 78.6 ± 1.7 Ma near Paso Córdoba
        (middle Campanian).
    - source_label: 'Garrido et al. 2014, Sedimentary palaeoenvironment… of the Anacleto Formation
        (Sedimentary Geology 308–309: 1–16)'
      source_type: specialist_descriptive_reference
      url: https://www.sciencedirect.com/science/article/abs/pii/S0895981114000352
      note: Sedimentology and basin context of the Anacleto Fm within the Neuquén Basin foreland
        fill.
    - source_label: 'Tectonophysics 2019: The Neuquén Group reconstruction (35–37°S)'
      source_type: geochronology_reference
      url: https://www.sciencedirect.com/science/article/pii/S0040195119302847
      note: Synthesizes regional dating; summarizes early Campanian age for the Anacleto (~83.5–79.5
        Ma) based on Dingus et al. and other data.
    - source_label: Heredia & Salgado 2005, JVP 25(3):623–634 — A new specimen of Neuquensaurus
        australis
      source_type: specialist_descriptive_reference
      url: https://www.researchgate.net/publication/232687962_A_new_specimen_of_Neuquensaurus_australis_a_Late_Cretaceous_Saltasaurine_titanosaur_from_North_Patagonia
      note: Documents Neuquensaurus (Saltasaurinae) from Cinco Saltos in the Anacleto Fm.
    - source_label: 'GBIF: Saltasauridae'
      source_type: taxonomic_database
      url: https://www.gbif.org/species/4967427
      note: Backbone taxonomy listing for the family; cross-references PBDB IDs.
    - source_label: Quattrocchio et al. 2005, Palynostratigraphy of the Salta Group (Micropaleontología
        37[2])
      source_type: geochronology_reference
      url: https://web.igme.es/publicaciones/revistaMicro/pdfs/Micropaleo37_2_2005.pdf
      note: Supports a Campanian–Maastrichtian age for upper Salta Group units including the
