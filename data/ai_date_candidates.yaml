    date_notes: "Scope and taxonomy: “Parvicursoridae” was originally erected with the description\
      \ of Parvicursor remotus, but most recent systematic works place these taxa within Alvarezsauridae\
      \ (often as Parvicursorinae) rather than recognizing a separate family. Taxonomic usage\
      \ at family rank is therefore inconsistent in the specialist literature and should be\
      \ treated cautiously. (Averianov & Lopatin 2021; see also the original Parvicursor concept\
      \ cited therein.)\n\nFossil occurrences attributable to the clade concept: - Parvicursor\
      \ remotus from the Khulsan locality, Barun Goyot (Baruungoyot)\n  Formation, Mongolia;\
      \ reappraised as Campanian Barun Goyot material.\n  (Averianov & Lopatin 2021)\n- Ceratonykus\
      \ oculatus from the Barun Goyot Formation (Khermiin Tsav),\n  explicitly assigned to\
      \ Parvicursoridae by its describers. (Alifanov &\n  Barsbold 2009)\n\n\nFormation-level\
      \ age constraints: Multiple stratigraphic syntheses and field studies document that\
      \ the Barun Goyot Formation and the overlying Nemegt Formation interfinger in the Nemegt\
      \ Basin, and that absolute dating of the key Barun Goyot fossil horizons is hampered\
      \ by scarce datable ash beds and limited microfossil biostratigraphy. Magnetostratigraphic\
      \ work correlates Baruungoyot–Nemegt sections to the late Campanian–earliest Maastrichtian\
      \ interval (approx. C33n–C31), but robust numeric tie points for the specific Khulsan/Khermiin\
      \ Tsav fossil beds are not demonstrated. Consequently, the widely cited “late Campanian\
      \ to earliest Maastrichtian” window for Barun Goyot remains only broadly calibrated.\
      \ (Eberth et al. 2009; Eberth 2018; Hicks et al. 2001 GSA; Jerzykiewicz & Russell 1991)\n\
      \nConservative resolution: Given (1) unstable family‑rank usage for the group, (2) the\
      \ oldest securely referred fossils (Parvicursor, Ceratonykus) deriving from Barun Goyot\
      \ horizons whose absolute ages are still debated within a broad late Campanian–earliest\
      \ Maastrichtian bracket, and (3) the absence of radiometric ages directly tied to the\
      \ specific fossil-bearing beds, a defensible numerical start_ma cannot be proposed without\
      \ over‑interpretation. Following project guidance, fossil occurrences are treated as\
      \ minimum constraints, but here the minimum cannot be expressed as a specific Ma value\
      \ pending stronger geochronology for the relevant Barun Goyot localities. The entry\
      \ is therefore left unresolved with null numerical fields until better-constrained dates\
      \ become available.\n"
