      occurrences anchor the family’s first appearance to that unit rather than to a molecular
      or phylogenetic divergence. High-precision CA–ID–TIMS U–Pb ages on interbedded tuffs
      from the fossiliferous lower Cañadón Asfalto constrain the relevant interval to the
      late Toarcian. Reported dates include 179.17 ± 0.12 Ma at the base of the fossiliferous
      succession and 178.07 ± 0.21 Ma higher in section, with additional Toarcian CA–ID–TIMS
      determinations ~179.5–177.3 Ma from correlative tuffs in the same member across the
      basin. Following this evidence, a cautious formation-derived minimum age of ~179.2 Ma
      is proposed for the first appearance of Piatnitzkysauridae. Note that some studies have
      reported younger (Bajocian–Callovian) ages for parts of the formation in other depocenters,
      but the late Toarcian dates cited here directly constrain the fossiliferous Las Chacritas
      interval that yields piatnitzkysaurids. This is a fossil-occurrence/formation-based
      minimum and not an evolutionary origin estimate for the clade.

      '
