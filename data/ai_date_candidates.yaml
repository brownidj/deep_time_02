  proposed_date_resolution:
    date_basis: fossil_first_appearance
    date_confidence: low
    date_notes: 'Rhegminornithidae was erected by Wetmore (1960) for the fossil bird Rhegminornis
      calobates from the Lower/Early Miocene of Florida. The known material is a distal tarsometatarsus
      from the Thomas Farm site (Gilchrist County). Olson & Farrand (1974) later reassigned
      Rhegminornis to Meleagrididae (turkeys), but the family-group name Rhegminornithidae
      persists historically in some treatments. For Deep Time 2, this clade’s timing should
      be treated strictly as a fossil-occurrence minimum based on the Thomas Farm locality
      rather than an evolutionary origin estimate for any broader lineage.

      The Thomas Farm deposits are sinkhole-fill sediments that yield an Early Miocene (Hemingfordian)
      vertebrate assemblage; museum syntheses place the site at about 18–18.5 Ma. Because
      this is a locality/biostratigraphic age rather than a direct radiometric date on the
      Rhegminornis-bearing bed, confidence is kept low. The Hemingfordian itself is generally
      calibrated to ~20.6–16.3 Ma, which brackets the site age.

      '
    date_resolution_method: specialist_literature
    date_sources:
    - source_label: Wetmore 1960, Classification, Smithsonian Miscellaneous Collections 139:1–37
      source_type: specialist_taxonomic_reference
      url: https://repository.si.edu/bitstream/handle/10088/22963/SMC_139_Wetmore_1960_11_1-37.pdf
      note: Erects Rhegminornithidae for Rhegminornis calobates; states Lower Miocene of Florida
        and places it in Charadrioidea.
    - source_label: Wetmore 1943, Fossil birds from the Tertiary deposits of Florida, Proc.
        New England Zool. Club 22:59–68
      source_type: specialist_descriptive_reference
      url: https://bionames.org/issn/0749-8934
      note: Original description including Rhegminornis calobates from Thomas Farm; citation
        record confirming publication details.
    - source_label: 'Olson & Farrand 1974, Rhegminornis restudied: a tiny Miocene turkey (Wilson
