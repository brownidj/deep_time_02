balochisauridae:
  context:
    common_label: Balochisauridae
    current_dates:
      date_basis: unresolved
      date_confidence: low
      date_notes: No usable specialist, PBDB, TimeTree, or reputable educational date found
        for balochisauridae.
      date_resolution_method: unresolved
      divergence_ma: null
      end_ma: null
      start_ma: null
    label: Balochisauridae
    parent_id: dinosauria
    rank: family
  proposed_date_resolution:
    date_basis: unresolved
    date_confidence: low
    date_notes: '“Balochisauridae” is a family-level name used primarily by M.S. Malkani for
      stocky titanosaurian material (e.g., Balochisaurus, Marisaurus) from the dinosaur-bearing
      red beds at Vitakri in the Sulaiman Basin (Pakistan). Independent vertebrate and sedimentological
      studies place the relevant Pab Range succession in the Maastrichtian, and late Maastrichtian
      ammonite biostratigraphy is documented regionally; however, there is no widely accepted,
      independently dated radiometric horizon that directly constrains the dinosaur-producing
      Vitakri beds, and the family-level taxon itself is not broadly adopted in specialist
      syntheses. Following Deep Time policy (treating formation ages as cautious minima and
      avoiding author-specific higher taxa without broad consensus), no numerical dates are
      proposed here. If future work corroborates the clade and ties the Vitakri horizons to
      a firm chronometric or narrowly constrained biostratigraphic age, a minimum fossil occurrence
      date (start_ma) can be added.

      '
    date_resolution_method: unresolved
    date_sources:
    - source_label: Malkani 2009 – New Balochisaurus (Balochisauridae, Titanosauria) and Vitakridrinda
        remains from Pakistan (Sindh Univ. Res. J. Sci. Ser. 41:65–92)
      source_type: specialist_descriptive_reference
      url: https://sujo.usindh.edu.pk/index.php/SURJ/article/download/6194/4229
      note: Explicitly erects/uses Balochisauridae and assigns Pakistani titanosaur material
        from the Vitakri beds.
    - source_label: Wilson, Malkani & Gingerich 2001 – New crocodyliform from the Upper Cretaceous
        Pab Formation of Vitakri, Balochistan (Contributions from the Museum of Paleontology,
        Univ. Michigan 30:321–336)
      source_type: specialist_descriptive_reference
      url: https://deepblue.lib.umich.edu/items/44a07e12-93ce-4f3a-8c1a-39e225466fd8
      note: Documents the Vitakri localities within the Pab Formation and treats them as Upper
        Cretaceous (Maastrichtian).
    - source_label: Eschard et al. 2003 – Downstream evolution of turbiditic channel complexes
        in the Pab Range outcrops (Maastrichtian, Pakistan) (Marine and Petroleum Geology
        20:691–710)
      source_type: literature
      url: https://www.researchgate.net/publication/229199567_Downstream_evolution_of_turbiditic_channel_complexes_in_the_Pab_Range_outcrops_Maastrichtian_Pakistan
      note: Refers to the Pab Formation as deposited during the Late Maastrichtian; supports
