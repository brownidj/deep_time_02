      source_type: geochronology_reference
      url: https://www.cambridge.org/core/services/aop-cambridge-core/content/view/9EEBB9F1896D3139F67B409A1C9CD4FF/S0022336000032467a.pdf/maastrichtian_ammonites_from_balochistan_pakistan.pdf
