    date_confidence: low
    date_notes: 'Protoplotidae is based on the Sumatran taxon Protoplotus beauforti, originally
      described by Lambrecht (1931) and reappraised by van Tets, Rich, and Marino-Hadiwardoyo
      (1989) as the basis for a distinct pelecaniform family. The holotype comes from Sibang
      in the Sangkarewang Formation (Ombilin Basin, West Sumatra). Modern summaries explicitly
      tie the specimen to the Sangkarewang Formation and note an “at least Eocene” age for
      these deposits. Palynological and stratigraphic work constraining the overlying Sawahlunto
      Formation to the middle–late Eocene implies an early–middle Eocene age for the underlying
      Sangkarewang Formation; additional fish-focused studies on the same beds also argue
      for an early–mid Eocene interval. Because the fossil is tied to a formation rather than
      a precisely dated horizon, this range is used cautiously as a formation-derived minimum
      window for the first appearance of Protoplotidae, not a true evolutionary origin date.
      Older assignments (e.g., Paleocene) have been suggested in parts of the literature and
      underscore the uncertainty; hence confidence remains low. For numeric boundaries of
      the early–middle Eocene window, the ICS chart (Ypresian 56.0 Ma to Lutetian base 47.8
      Ma to Bartonian base 41.2 Ma) is followed.

      '
    date_resolution_method: formation_age_inference
    date_sources:
