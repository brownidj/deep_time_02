      the clade’s first appearance in that basin. Additional mamenchisaurid occurrences in
      the upper Shishugou Formation (Xinjiang), including Mamenchisaurus sinocanadorum, are
      consistent with an Oxfordian age bracketed by dated tuffs at ~161.2–158.7 Ma. For the
      youngest record, detrital zircon U–Pb ages from classic Mamenchisaurus anyuensis sites
      in the Suining Formation average 114.4 ± 1.1 Ma (Aptian). Although some subsequent works
      argue for a Late Jurassic age of the Suining Formation based on biostratigraphic comparisons,
      the published radiometric dataset provides a conservative youngest-appearance minimum.
      Mamenchisaurid material from Thailand’s Phu Kradung Formation also indicates survival
      near the Jurassic–Cretaceous boundary. These values are fossil-occurrence/formation
      ages (minima) and should not be interpreted as evolutionary origin or true extinction
      times for the family.

