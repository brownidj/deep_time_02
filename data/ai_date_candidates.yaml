      expanded the family to include very early sauropodomorphs such as Saturnalia, Panphagia
      and Chromogisaurus (often as “Saturnaliinae” within Guaibasauridae sensu Ezcurra 2010),
      though more recent analyses tend to segregate these as Saturnaliidae and/or recover
      Guaibasaurus outside that clade. Because of this phylogenetic instability, the family’s
      earliest occurrence depends on the definition adopted. High‑precision CA‑ID‑TIMS U‑Pb
      dating constrains the Saturnalia‑bearing upper Santa Maria Formation (Cerro da Alemoa)
      to 233.23 ± 0.73 Ma (Carnian), whereas a single‑zircon 206Pb/238U date of 225.42 ± 0.37
      Ma provides only a maximum age for the Guaibasaurus‑bearing Caturrita Formation (early
      Norian). Here, a cautious fossil minimum of 233.23 Ma is proposed only under the broadened
      usage that includes Saturnalia within Guaibasauridae; if the family is restricted to
      Guaibasaurus sensu some recent treatments, the minimum would be younger (Caturrita,
      ~225 Ma maximum constraint). In all cases this should be treated as a formation‑derived
      fossil minimum, not an evolutionary origin estimate for the clade.

      '
