      are within the Hsanda Gol Formation. The Hsanda Gol lower strata are magnetostratigraphically
      correlated to GPTS Chrons C13r–C12r (~34–31.2 Ma), and an interbedded basalt flow (“Basalt
      I”) has 40Ar/39Ar ages clustered around ~31.5 Ma. Because the exact bed for Heterostrix
      within Hsanda Gol is not specified in the original description, a cautious formation/flow-derived
      minimum of ~31.5 Ma is proposed, acknowledging that the fossil could be slightly older
      within the early Rupelian interval (~34–31.2 Ma). This is a fossil-occurrence/formation-derived
      minimum and should not be interpreted as a phylogenetic origin age for the family.

