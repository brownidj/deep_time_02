      Proceratosaurus bradleyi from Minchinhampton (Gloucestershire, UK), described and reappraised
      as a basal tyrannosauroid forming a monophyletic Proceratosauridae with Guanlong. The
      holotype’s precise bed within the Great Oolite Group is uncertain (commonly attributed
      to the White Limestone Formation or the overlying Forest Marble Formation), but both
      units are Bathonian in age. Accordingly, the family’s first appearance is bracketed
      by the Bathonian stage limits 168.3–166.1 Ma on the International Chronostratigraphic
      Chart. This is a stage/formation-derived fossil minimum and should not be treated as
      a calibrated divergence date. Additional Bathonian proceratosaurid material (e.g., Kileskus
      from the Itat Formation, West Siberia) corroborates a Middle Jurassic presence but does
      not extend the range earlier than Bathonian.

      '
