      on field data and invertebrate/microfossil assemblages; and (ii) H. liujiaxiaensis from
      the Hekou Group (Lanzhou–Minhe Basin), widely treated as Lower Cretaceous. Because the
      available constraints are formation-/stage-level rather than bed-tied radiometric ages
      at the fossil horizons, this is treated as a cautious formation-derived fossil minimum
      rather than a phylogenetic or molecular origin estimate. A conservative numerical minimum
      of 113.2 Ma (approximate base Albian on the current ICS chart) is adopted within the
      Aptian–Albian window reported for the Haoling Formation. Note that later phylogenetic
      work questions the monophyly and utility of “Huanghetitanidae,” so this date should
      be interpreted strictly as a fossil-occurrence/formation minimum for the family-level
      taxon as used in the literature, not as a clade-origin calibration.

